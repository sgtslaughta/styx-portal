name: Setup Node
description: Node setup + frontend dependency install
inputs:
  working-directory:
    description: Directory containing package.json
    required: false
    default: frontend
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci
