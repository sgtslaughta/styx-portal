stages: [quality, test, security, release, build, scan, pages]

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ---- DRY anchors -------------------------------------------------------------
.backend_setup: &backend_setup
  image: python:3.12
  before_script:
    - cd backend
    - python -m venv .venv
    - .venv/bin/pip install --upgrade pip -q
    - .venv/bin/pip install -e ".[dev]" -q

.node_setup: &node_setup
  image: node:20

.on_push_or_mr: &on_push_or_mr
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ---- quality -----------------------------------------------------------------
ruff:
  stage: quality
  <<: *backend_setup
  <<: *on_push_or_mr
  script: [.venv/bin/python -m ruff check app tests]

mypy:
  stage: quality
  <<: *backend_setup
  <<: *on_push_or_mr
  allow_failure: true            # non-blocking baseline
  script: [.venv/bin/python -m mypy]

frontend-build:
  stage: quality
  <<: *node_setup
  <<: *on_push_or_mr
  script:
    - cd frontend
    - npm ci
    - npm run build

# ---- test --------------------------------------------------------------------
pytest:
  stage: test
  <<: *backend_setup
  <<: *on_push_or_mr
  script: [.venv/bin/python -m pytest -q]

vitest:
  stage: test
  <<: *node_setup
  <<: *on_push_or_mr
  script:
    - cd frontend
    - npm ci
    - npm test

# ---- security ----------------------------------------------------------------
bandit:
  stage: security
  <<: *backend_setup
  <<: *on_push_or_mr
  script: [.venv/bin/python -m bandit -c pyproject.toml -r app -ll -ii]

trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:0.58.0
    entrypoint: [""]
  <<: *on_push_or_mr
  script:
    - trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .

# ---- release (semantic-release on default branch) ----------------------------
semantic-release:
  stage: release
  image: node:22   # semantic-release 25 requires Node >=22.14
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - npm ci --no-audit --no-fund
    # Needs GITLAB_TOKEN (Project Access Token, api scope) to create the tag/release.
    # The tag push then triggers the build/scan jobs. Without the token this no-ops
    # (|| true) and the pipeline stays green — just no GitLab release/images.
    - npx semantic-release || true

# ---- build (one job per image; matrix over IMAGE) ----------------------------
.build_template: &build_template
  stage: build
  image: docker:27
  services: [docker:27-dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    # Build/scan images ONLY on release tags. semantic-release creates a v* tag,
    # which spawns a tag pipeline ($CI_COMMIT_TAG set). Branch pipelines never
    # build — prevents empty-version tags when no release was cut (e.g. no token).
    - if: '$CI_COMMIT_TAG =~ /^v/'
      variables: { VERSION: "$CI_COMMIT_TAG" }
  before_script:
    - 'V="${VERSION#v}"; echo "Building $IMAGE:$V"'
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - V="${VERSION#v}"
    - docker build -t "$CI_REGISTRY_IMAGE/$IMAGE:$V" -t "$CI_REGISTRY_IMAGE/$IMAGE:latest" -f "$CONTEXT/Dockerfile" "$CONTEXT"
    - docker push "$CI_REGISTRY_IMAGE/$IMAGE:$V"
    - docker push "$CI_REGISTRY_IMAGE/$IMAGE:latest"

build-backend:
  <<: *build_template
  variables: { IMAGE: backend, CONTEXT: backend }

build-frontend:
  <<: *build_template
  variables: { IMAGE: frontend, CONTEXT: frontend }

build-desktop:
  <<: *build_template
  variables: { IMAGE: desktop, CONTEXT: images/desktop }
  # Desktop image ~4.5GB — shared runners may hit disk/time limits.
  # Document self-hosted runner tag here when available, e.g.:  tags: [big-disk]
  allow_failure: true

# ---- scan (Trivy image scan after build) -------------------------------------
.scan_template: &scan_template
  stage: scan
  image:
    name: aquasec/trivy:0.58.0
    entrypoint: [""]
  rules:
    # Build/scan images ONLY on release tags. semantic-release creates a v* tag,
    # which spawns a tag pipeline ($CI_COMMIT_TAG set). Branch pipelines never
    # build — prevents empty-version tags when no release was cut (e.g. no token).
    - if: '$CI_COMMIT_TAG =~ /^v/'
      variables: { VERSION: "$CI_COMMIT_TAG" }
  script:
    - V="${VERSION#v}"
    # PKG_TYPES defaults to os,library (backend/frontend: their app deps are ours).
    # Desktop overrides to os only — its library findings are vendored inside the
    # browsers/IDEs (bundled JARs, node_modules) and aren't fixable from our image.
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --pkg-types "${PKG_TYPES:-os,library}" "$CI_REGISTRY_IMAGE/$IMAGE:$V"

scan-backend:  { <<: *scan_template, needs: [build-backend],  variables: { IMAGE: backend } }
scan-frontend: { <<: *scan_template, needs: [build-frontend], variables: { IMAGE: frontend } }
scan-desktop:  { <<: *scan_template, needs: [build-desktop],  variables: { IMAGE: desktop, PKG_TYPES: os }, allow_failure: true }

# ---- pages (Zensical → GitLab Pages) -----------------------------------------
pages:
  stage: pages
  image: python:3.12
  script:
    # Shared with .github/workflows/docs.yml: pinned zensical + prunes internal specs/plans.
    - sh scripts/build-docs.sh
  pages:
    publish: site
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
