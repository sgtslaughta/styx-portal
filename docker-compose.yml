networks:
  selkies-hub:
    name: selkies-hub
    driver: bridge

volumes:
  db-data:
  screenshots:

services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - DOCKER_API_VERSION=1.45
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - selkies-hub
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.dashboard.entrypoints=web
      - traefik.http.routers.dashboard.middlewares=authentik@file
      - traefik.http.routers.dashboard.service=api@internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - selkies-hub

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - DOMAIN=${DOMAIN}
      - DATABASE_URL=sqlite+aiosqlite:///./data/selkies-hub.db
      - DOCKER_NETWORK=selkies-hub
      - TEMPLATES_DIR=/app/templates
      - AUTHENTIK_MIDDLEWARE=authentik@file
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - db-data:/app/data
      - screenshots:/app/data/screenshots
      - ./templates:/app/templates:ro
    networks:
      - selkies-hub
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.middlewares=authentik@file
      - traefik.http.services.api.loadbalancer.server.port=8000

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - selkies-hub
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.middlewares=authentik@file
      - traefik.http.services.frontend.loadbalancer.server.port=3000
