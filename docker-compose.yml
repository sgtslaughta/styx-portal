networks:
  selkies-hub:
    name: selkies-hub
    driver: bridge

volumes:
  db-data:
  screenshots:
  traefik-dynamic:

services:
  traefik:
    image: traefik:v3.4
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - selkies-hub

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - selkies-hub

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - DOMAIN=${DOMAIN}
      - DATABASE_URL=sqlite+aiosqlite:///./data/selkies-hub.db
      - DOCKER_NETWORK=selkies-hub
      - TEMPLATES_DIR=/app/templates
      - AUTHENTIK_MIDDLEWARE=authentik@file
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - db-data:/app/data
      - screenshots:/app/data/screenshots
      - traefik-dynamic:/app/traefik-dynamic
      - ./templates:/app/templates:ro
    networks:
      - selkies-hub

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - selkies-hub
