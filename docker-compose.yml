networks:
  styx-portal:
    name: styx-portal
    driver: bridge

volumes:
  db-data:
  screenshots:
  traefik-dynamic:

services:
  traefik:
    image: traefik:v3.4
    container_name: styx-traefik
    restart: unless-stopped
    # ports:
    #   - "80:80"       # Uncomment for local access without Cloudflare
    #   - "8080:8080"   # Traefik dashboard
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - styx-portal

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    depends_on:
      - traefik
      - frontend
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - styx-portal

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - DOMAIN=${DOMAIN}
      - DATABASE_URL=sqlite+aiosqlite:///./data/styx-portal.db
      - DOCKER_NETWORK=styx-portal
      - TEMPLATES_DIR=/app/templates
      - AUTHENTIK_MIDDLEWARE=authentik@file
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - db-data:/app/data
      - screenshots:/app/data/screenshots
      - traefik-dynamic:/app/traefik-dynamic
      - ./templates:/app/templates:ro
    devices:
      - /dev/dri:/dev/dri
    networks:
      - styx-portal

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - styx-portal
