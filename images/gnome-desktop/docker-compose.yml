services:
  gnome:
    build: .
    image: selkies-gnome:latest
    container_name: selkies-gnome
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - gnome-config:/config
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - TITLE=GNOME Desktop
      - PIXELFLUX_WAYLAND=true
      - START_DOCKER=false
    restart: unless-stopped

volumes:
  gnome-config:
